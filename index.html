<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>BhavyaOS - Terminal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23050505%22/><text x=%2215%22 y=%2270%22 font-family=%22monospace%22 font-size=%2260%22 fill=%22%2320C20E%22 font-weight=%22bold%22>%3E_</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --term-green: #20c20e;
        --term-bg: #050505;
        --term-glow: rgba(32, 194, 14, 0.4);
        --term-dir: #3b8eea;
        --term-file: #e5e510;
        --term-err: #ff5555;
      }

      body {
        background-color: var(--term-bg);
        color: var(--term-green);
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 14px;
        margin: 0;
        padding: 20px 20px 60px 20px;
        overflow-x: hidden;
        text-shadow: 0 0 4px var(--term-glow);
      }

      #terminal {
        white-space: pre-wrap;
        word-wrap: break-word;
        line-height: 1.5;
      }

      .c-dir {
        color: var(--term-dir);
        font-weight: bold;
        text-shadow: 0 0 3px rgba(59, 142, 234, 0.5);
      }
      .c-file {
        color: var(--term-file);
      }
      .c-err {
        color: var(--term-err);
      }
      .prompt-user {
        font-weight: bold;
      }

      .cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        background-color: var(--term-green);
        animation: blink 1s step-end infinite;
        vertical-align: text-bottom;
        box-shadow: 0 0 5px var(--term-green);
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .crt-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
          radial-gradient(circle, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.4) 100%);
        background-size:
          100% 4px,
          100% 100%;
        pointer-events: none;
        z-index: 50;
        animation: crt-flicker 0.15s infinite;
      }

      @keyframes crt-flicker {
        0% {
          opacity: 0.98;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.99;
        }
      }

      #shortcut-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #111;
        color: #888;
        padding: 8px 20px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        z-index: 100;
        border-top: 1px solid #333;
      }

      .key-hint {
        color: #ccc;
        font-weight: bold;
      }

      #mobile-trap {
        position: absolute;
        opacity: 0;
        top: -9999px;
      }
    </style>
  </head>
  <body>
    <div class="crt-overlay"></div>

    <input
      type="text"
      id="mobile-trap"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      autocapitalize="none"
    />

    <div id="terminal">
      <div id="boot-sequence"></div>
      <div id="interactive-layer" style="display: none">
        <div id="output"></div>
        <div id="input-line">
          <span id="prompt" class="prompt-user">guest@bhavya-os:/$</span>
          <span id="current-input"></span><span class="cursor"></span>
        </div>
      </div>
    </div>

    <div id="shortcut-bar">
      <span><span class="key-hint">Tab</span> Autocomplete</span>
      <span><span class="key-hint">↑/↓</span> History</span>
      <span><span class="key-hint">Ctrl+C</span> Cancel Line</span>
      <span><span class="key-hint">Ctrl+L</span> Clear Display</span>
    </div>

    <script type="module">
      import init, { Terminal } from "./pkg/bhavya_os.js";

      const escapeHTML = (str) => {
        return str.replace(
          /[&<>'"]/g,
          (tag) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              "'": "&#39;",
              '"': "&quot;",
            })[tag] || tag,
        );
      };

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      async function boot() {
        await init();
        const term = new Terminal();

        const bootDiv = document.getElementById("boot-sequence");
        const interactiveLayer = document.getElementById("interactive-layer");
        const outputDiv = document.getElementById("output");
        const inputSpan = document.getElementById("current-input");
        const promptSpan = document.getElementById("prompt");
        const mobileTrap = document.getElementById("mobile-trap");

        const bootLogs = [
          "[ OK ] Started Cryptographic Verification Engine.",
          "[ OK ] Initializing Virtual File System...",
          "[ OK ] Loading secp256k1 curves...",
          "[ OK ] Reached target System Initialization.",
          " ",
          "BhavyaOS v2.0.26 (tty1)",
          "Welcome to the portfolio of Bhavya Jain.",
          "Systems & Cryptography Engineer.",
          "Type 'help' to see available commands.",
        ];

        for (const log of bootLogs) {
          bootDiv.innerHTML += `<div>${log}</div>`;
          window.scrollTo(0, document.body.scrollHeight);
          await sleep(Math.random() * 150 + 50);
        }

        bootDiv.innerHTML += `<br>`;
        interactiveLayer.style.display = "block";

        document.addEventListener("click", () => mobileTrap.focus());
        mobileTrap.focus();

        const handleKeydown = (e) => {
          if (
            ["Space", "ArrowUp", "ArrowDown", "Tab"].includes(e.code) ||
            e.key === "Backspace"
          ) {
            e.preventDefault();
          }

          if (e.ctrlKey) {
            if (e.key === "l" || e.key === "L") {
              e.preventDefault();
              outputDiv.innerHTML = "";
              return;
            }
            if (e.key === "c" || e.key === "C") {
              e.preventDefault();
              const oldPrompt = promptSpan.innerText;
              const prevCmd = escapeHTML(term.get_buffer());
              outputDiv.innerHTML += `<div><span class="prompt-user">${oldPrompt}</span> ${prevCmd}^C</div>`;
              term.clear_buffer();
              inputSpan.innerText = "";
              window.scrollTo(0, document.body.scrollHeight);
              return;
            }
            if (e.key === "u" || e.key === "U") {
              e.preventDefault();
              term.clear_buffer();
              inputSpan.innerText = "";
              return;
            }
            return;
          }

          if (e.metaKey || e.altKey) return;

          let key = e.key;

          const bufferSnapshot = term.get_buffer();
          let result = "";

          if (key === "ArrowUp") result = term.handle_up();
          else if (key === "ArrowDown") result = term.handle_down();
          else if (key === "Tab") result = term.handle_tab();
          else if (key === "Enter" || key === "Backspace") {
            result = term.process_key(key);
          } else if (key.length === 1) {
            result = term.process_key(key);
            e.preventDefault();
          }

          if (key === "Enter") {
            const prevCmd = escapeHTML(bufferSnapshot);
            const oldPrompt = promptSpan.innerText;

            if (result === "__CLEAR_SCREEN__") {
              outputDiv.innerHTML = "";
            } else if (result !== "") {
              outputDiv.innerHTML += `<div><span class="prompt-user">${oldPrompt}</span> ${prevCmd}</div>`;
              outputDiv.innerHTML += `<div style="margin-bottom: 8px;">${result}</div>`;
            } else {
              outputDiv.innerHTML += `<div><span class="prompt-user">${oldPrompt}</span> ${prevCmd}</div>`;
            }

            promptSpan.innerText = `guest@bhavya-os:${term.get_cwd()}$`;

            requestAnimationFrame(() => {
              window.scrollTo(0, document.body.scrollHeight);
            });
            mobileTrap.value = "";
          }

          inputSpan.innerText = escapeHTML(term.get_buffer());
        };

        document.addEventListener("keydown", handleKeydown);
        mobileTrap.addEventListener("input", (e) => {
          const char = e.data;
          if (char) {
            term.process_key(char);
            inputSpan.innerText = escapeHTML(term.get_buffer());
          }
        });
      }

      boot();
    </script>
  </body>
</html>
